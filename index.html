<article class="card">
  <details open>
    <summary>
      Daily Tasks
      <div class="actions">
        <button id="resetDailyBtn">Reset Daily</button>
      </div>
    </summary>
    <ul id="dailyList" class="checklist"></ul>
    <div class="inline-form">
      <input id="newDailyTask" type="text" placeholder="Add custom daily task" />
      <button id="addDailyTaskBtn">Add</button>
    </div>
  </details>
</article>

<article class="card">
  <details open>
    <summary>Custom Tasks</summary>
    <p class="sub">Custom tasks can be edited or deleted.</p>
    <div class="inline-form">
      <input id="newCustomTask" type="text" placeholder="Add one-off task" />
      <button id="addCustomTaskBtn">Add</button>
    </div>
    <ul id="customList" class="checklist"></ul>
  </details>
</article>
